<div
  class="border-2 border-dashed border-slate-600 rounded-2xl p-16 text-center cursor-pointer transition-all hover:border-indigo-400 hover:bg-slate-800/50 bg-slate-800"
  [class.border-indigo-400]="isDragging()"
  [class.bg-slate-700]="isDragging()"
  [class.border-red-400]="error()"
  [class.bg-red-900/20]="error()"
  appDropZone
  accept="application/pdf"
  (fileDropped)="onFileDropped($event)"
  (dragover)="onDragOver()"
  (dragleave)="onDragLeave()"
>
  <input
    type="file"
    accept="application/pdf"
    (change)="onFileSelected($event)"
    #fileInput
    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
  />

  <div class="pointer-events-none">
    <div class="p-4 bg-indigo-900/50 rounded-2xl w-fit mx-auto mb-6">
      <svg
        class="w-14 h-14 text-indigo-400"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
        />
      </svg>
    </div>

    <p class="text-xl text-slate-200 font-medium mb-2">
      <button type="button" class="text-indigo-400 font-bold hover:underline" (click)="fileInput.click(); $event.stopPropagation()">
        Browse
      </button>
      or drop your PDF here
    </p>
    <p class="text-base text-slate-500">PDF up to 50MB</p>
  </div>

  @if (error()) {
    <p class="text-red-400 text-base mt-6 font-semibold">{{ error() }}</p>
  }
</div>
