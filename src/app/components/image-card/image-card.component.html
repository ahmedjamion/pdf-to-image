<div class="border-2 border-black rounded bg-white">
  <img [src]="imageUrl()" [alt]="'Page ' + image().pageNumber" class="object-cover" />
  <div class="flex items-center justify-between p-2 flex-wrap border-t-2 border-black">
    <p>Page {{ image().pageNumber }}</p>
    <button class="bg-black text-white px-4 py-2 rounded" (click)="onDownload()">
      Download Page
    </button>
  </div>
</div>
