<div class="border-2 border-secondary rounded bg-background">
  <img
    [src]="imageUrl()"
    [alt]="'Page ' + image().pageNumber"
    class="object-cover border-b-2 border-secondary"
  />
  <div class="flex items-center justify-between p-2">
    <p>Page {{ image().pageNumber }}</p>
    <button class="bg-primary text-on-primary px-4 py-2 rounded" (click)="onDownload()">
      Download Page
    </button>
  </div>
</div>
