<div class="bg-surface text-on-surface overflow-clip rounded-xl transition-all flex flex-col">
  <img [src]="imageUrl()" [alt]="'Page ' + image().pageNumber" class="object-cover" />
  <button
    class="m-2 flex items-center justify-center gap-2 px-4 py-2 text-on-primary bg-primary rounded-lg text-sm font-semibold cursor-pointer"
    (click)="onDownload()"
  >
    Download Page
  </button>
</div>
